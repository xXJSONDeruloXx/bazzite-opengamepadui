# OpenGamepadUI Configuration for Handheld Gaming OS
# This file contains optimized settings for handheld gaming devices

[general]
# Enable first boot setup for new installations
first_boot=true

# Set appropriate FPS limit for handheld devices (balance performance/battery)
max_fps=60

# Default theme optimized for small screens
theme="res://assets/themes/card_ui-darksoul.tres"

# Default locale
locale="en_US"

[display]
# Optimize for handheld screen sizes
scale_factor=1.0
ui_scale=1.0

[input]
# Enable advanced input management
inputplumber_enabled=true

# Optimize for handheld controls
haptic_feedback=true
rumble_enabled=true

[performance]
# Enable performance management for handheld devices
powerstation_enabled=true
auto_performance_profiles=true

# Default performance profile for balanced gaming
default_profile="balanced"

[library]
# Enable multiple game sources for broader compatibility
steam_enabled=true
lutris_enabled=true
flatpak_enabled=true
desktop_enabled=true

# Game library paths
game_paths=[
    "/home/gamer/.steam",
    "/home/gamer/.local/share/Steam",
    "/var/lib/flatpak/exports/share/applications",
    "/home/gamer/.local/share/applications"
]

[network]
# Enable network management through OpenGamepadUI
networkmanager_enabled=true
wifi_autoconnect=true

[audio]
# Audio optimizations for gaming
pulseaudio_enabled=true
low_latency_audio=true

[system]
# System integration settings
session_switching_enabled=true
desktop_mode_available=true
power_management_enabled=true

# Enable system service management
service_management_enabled=true
